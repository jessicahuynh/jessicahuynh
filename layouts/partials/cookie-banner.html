{{ $analyticsID := site.Params.analytics.googleAnalyticsId | default "UA-34043400-1" }}

<div id="cookie-banner" class="cookie-banner" data-analytics-id='{{ $analyticsID }}' hidden>
  <div class="cookie-banner__inner" role="dialog" aria-labelledby="cookie-banner-title" aria-describedby="cookie-banner-copy">
    <p id="cookie-banner-title" class="cookie-banner__title">Cookies</p>
    <p id="cookie-banner-copy" class="cookie-banner__copy">
      This site uses analytics cookies only if you accept. Read the <a href="/privacy/">Privacy Policy</a> for details.
    </p>

    <div class="cookie-banner__actions">
      <button type="button" class="cookie-banner__button cookie-banner__button--secondary" data-cookie-choice="reject">Reject</button>
      <button type="button" class="cookie-banner__button" data-cookie-choice="accept">Accept</button>
      <button type="button" class="cookie-banner__button" data-cookie-choice="thanks" hidden>Thanks</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const banner = document.getElementById('cookie-banner');
    const analyticsID = banner ? banner.getAttribute('data-analytics-id') : '';
    const bannerOffsetVar = '--cookie-banner-offset';
    const rootElement = document.documentElement;
    const bodyElement = document.body;
    const copyElement = banner ? banner.querySelector('#cookie-banner-copy') : null;
    const acceptButton = banner ? banner.querySelector('[data-cookie-choice="accept"]') : null;
    const rejectButton = banner ? banner.querySelector('[data-cookie-choice="reject"]') : null;
    const thanksButton = banner ? banner.querySelector('[data-cookie-choice="thanks"]') : null;
    let isVisible = false;

    if (!banner || !window.CookieConsent) {
      return;
    }

    function setBannerOffset(active) {
      if (active) {
        rootElement.style.setProperty(bannerOffsetVar, banner.offsetHeight + 'px');
      } else {
        rootElement.style.setProperty(bannerOffsetVar, '0px');
      }
    }

    function showBanner() {
      if (isVisible) {
        setBannerOffset(true);
        return;
      }

      isVisible = true;
      banner.hidden = false;
      bodyElement.classList.add('has-cookie-banner');
      requestAnimationFrame(function() {
        setBannerOffset(true);
      });
    }

    function hideBanner() {
      if (!isVisible) {
        return;
      }

      isVisible = false;
      bodyElement.classList.remove('has-cookie-banner');
      setBannerOffset(false);
      banner.hidden = true;
    }

    function renderBanner(state) {
      const informationalMode = state.reason === 'privacy-signal';

      if (copyElement) {
        copyElement.innerHTML = state.bannerCopyHTML;
      }

      if (acceptButton) {
        acceptButton.hidden = informationalMode;
      }

      if (rejectButton) {
        rejectButton.hidden = informationalMode;
      }

      if (thanksButton) {
        thanksButton.hidden = !informationalMode;
      }

      if (state.showBanner) {
        showBanner();
      } else {
        hideBanner();
      }
    }

    banner.addEventListener('click', function(event) {
      const button = event.target.closest('[data-cookie-choice]');

      if (!button) {
        return;
      }

      const choice = button.dataset.cookieChoice;

      if (choice === 'accept') {
        window.CookieConsent.setConsent(true);
        return;
      }

      if (choice === 'reject') {
        window.CookieConsent.setConsent(false);
        return;
      }

      if (choice === 'thanks') {
        window.CookieConsent.hideBanner();
      }
    });

    window.CookieConsent.initialize({ analyticsID: analyticsID });
    window.CookieConsent.subscribe(renderBanner);
    renderBanner(window.CookieConsent.applyState());

    window.addEventListener('resize', function() {
      if (!banner.hidden) {
        setBannerOffset(true);
      }
    });
  })();
</script>
