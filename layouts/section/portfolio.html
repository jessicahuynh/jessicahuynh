{{ partial "header.html" . }}

<section class="portfolio">
	<header>
		<div class="section-heading">
			<h2>{{ .Title }}</h2>
		</div>
	</header>
	
	<div>
		<div class="section-body">{{ .Content }}</div>
		
		<div class="section-body portfolioGrid">
			{{ range .Data.Pages }}
				{{ partial "postcard.html" . }}
			{{ end }}
		</div>
		<div class="section-body">&nbsp;</div>
	</div>
	
</section>

{{ partial "footer.html" . }}
