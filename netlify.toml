[build.environment]
    DART_SASS_VERSION = "1.101.0"
    GO_VERSION = "1.26.5"
    HUGO_VERSION = "0.164.0"
    NODE_VERSION = "24.18.0"

[build]
    publish = "public"
    command = '''
curl -sfLO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" && \
tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" && \
rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz" && \
export PATH="${HOME}/.local/dart-sass:${PATH}" && \
git config --global core.quotepath false && \
hugo build --gc --minify
'''

[context.production.environment]
    HUGO_VERSION = "0.164.0"
    HUGO_ENV = "production"
    HUGO_ENABLEGITINFO = "true"

[[redirects]]
    from = "https://jessicahuynh.netlify.app/*"
    to = "https://www.jessicahuynh.info/:splat"
    status = 301
    force = true

[[redirects]]
    from = "https://jessicahuynh.netlify.com/*"
    to = "https://www.jessicahuynh.info/:splat"
    status = 301
    force = true

[[redirects]]
    from = "/blog/:year/:month/"
    to = "/archive/#:year"
    status = 301

[[redirects]]
    from = "/blog/:year"
    to = "/archive/#:year"
    status = 301

[[redirects]]
    from = "/varieties"
    to = "/types"
    status = 301

[[redirects]]
    from = "/blog/tags"
    to = "/tags"
    status = 301

[[redirects]]
    from = "/blog/categories"
    to = "/categories"
    status = 301
